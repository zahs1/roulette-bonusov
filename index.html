<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рулетка бонусов</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; form-action 'none'; base-uri 'self'" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Unbounded:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@1.23.0/dist/umd/lucide.min.js" integrity="sha384-ouAVEJVCMsf8Svzn+BwqbaBhxBEA0xgeVBhHnxmWd+Wqyv18yhWCQwGegFD/OHLq" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <main class="wheel-section">
      <header class="wheel-header">
        <span class="kicker">ПРИЗОВОЕ КОЛЕСО</span>
        <h1 class="title">Рулетка<br />бонусов</h1>
      </header>
      <div class="wheel-wrapper">
        <div class="pointer" aria-hidden="true"></div>
        <div class="wheel-container">
          <div class="wheel-bezel" aria-hidden="true"></div>
          <div class="wheel-bulbs" id="bulbContainer" aria-hidden="true"></div>
          <div class="wheel-disc" id="wheelDisc">
            <div class="wheel-labels" id="labelContainer"></div>
          </div>
          <div class="wheel-shine" aria-hidden="true"></div>
          <div class="wheel-center" aria-hidden="true"></div>
        </div>
        <button class="spin-btn" id="spinBtn">Крутить</button>
      </div>
    </main>
    <aside class="rail" id="rail">
      <div class="rail-header">
        <h2 class="rail-title">Бонусы</h2>
        <button class="add-btn" id="addBtn" aria-label="Добавить бонус">
          <i data-lucide="plus" width="18" height="18"></i>
          <span>Добавить</span>
        </button>
      </div>
      <div class="bonus-list" id="bonusList"></div>
      <div class="empty-state" id="emptyState" hidden>
        <i data-lucide="gift" width="40" height="40"></i>
        <p>Добавьте минимум 2 бонуса,<br />чтобы крутить колесо</p>
      </div>
    </aside>
  </div>
  <div class="result-overlay" id="resultOverlay" hidden>
    <div class="result-content">
      <div class="result-medal" id="resultMedal">
        <i data-lucide="gift" width="48" height="48" id="resultIcon"></i>
      </div>
      <p class="result-name" id="resultName"></p>
      <div class="result-actions">
        <button class="spin-btn spin-btn--small" id="spinAgain">Крутить ещё</button>
        <button class="result-close" id="closeResult">Закрыть</button>
      </div>
    </div>
    <canvas class="confetti-canvas" id="confettiCanvas" aria-hidden="true"></canvas>
  </div>
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Добавить бонус</h3>
        <button class="modal-close" id="modalClose" aria-label="Закрыть">
          <i data-lucide="x" width="20" height="20"></i>
        </button>
      </div>
      <div class="modal-field">
        <label class="modal-label" for="modalName">Название</label>
        <input type="text" class="modal-input" id="modalName" placeholder="Например: Скидка 20%" maxlength="40" autocomplete="off" />
      </div>
      <div class="modal-field">
        <label class="modal-label">Иконка</label>
        <div class="icon-grid" id="iconGrid"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn--primary" id="modalSave">Сохранить</button>
        <button class="modal-btn modal-btn--secondary" id="modalCancel">Отмена</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
